name: build-desktop

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build-command: npm run tauri:mac:build
            artifact-name: trackcast-macos-bundles
            artifact-path: |
              apps/mac/src-tauri/target/release/bundle/dmg/*.dmg
              apps/mac/src-tauri/target/release/bundle/macos/*.app
          - os: windows-latest
            build-command: npm run tauri:windows:build
            artifact-name: trackcast-windows-bundles
            artifact-path: |
              apps/windows/src-tauri/target/release/bundle/msi/*.msi
              apps/windows/src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build desktop app
        run: ${{ matrix.build-command }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
