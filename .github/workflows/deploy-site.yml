name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'assets/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Stage deploy directory
        run: |
          mkdir -p _deploy
          cp -R site/. _deploy/
          cp -R assets _deploy/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy
      - id: deployment
        uses: actions/deploy-pages@v4
